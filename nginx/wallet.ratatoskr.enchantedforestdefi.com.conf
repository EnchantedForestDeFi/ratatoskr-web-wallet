# Nginx server block for wallet.ratatoskr.enchantedforestdefi.com
# Place this file in /etc/nginx/sites-available/ and symlink to sites-enabled/
# Then run: certbot --nginx -d wallet.ratatoskr.enchantedforestdefi.com
#
# Architecture: this is the EDGE nginx on vps1 (TLS-terminating). It reverse-
# proxies to vps2 over the WireGuard tunnel for both the static frontend and
# the /api/ backend.

# Rate-limiting zone definition (top-level; referenced inside the server block)
# 10 req/sec average per IP, 10MB shared memory zone for state
limit_req_zone $binary_remote_addr zone=wallet_api:10m rate=10r/s;

server {
    listen 80;
    server_name wallet.ratatoskr.enchantedforestdefi.com;

    # Redirect HTTP to HTTPS (certbot will modify this on first issue)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name wallet.ratatoskr.enchantedforestdefi.com;

    # SSL certificates (managed by certbot)
    # ssl_certificate /etc/letsencrypt/live/wallet.ratatoskr.enchantedforestdefi.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/wallet.ratatoskr.enchantedforestdefi.com/privkey.pem;

    # Modern TLS settings (TLS 1.2 minimum, TLS 1.3 preferred)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ─── Security headers ───────────────────────────────────────────────
    # All headers use `always` so they are sent on error pages (4xx/5xx) too.

    # HSTS — 2 years, includeSubDomains, preload-eligible
    # Once stable: submit to https://hstspreload.org for preload list inclusion
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Content Security Policy — strictest workable for a self-custody wallet
    # 'wasm-unsafe-eval' is required for secp256k1.wasm execution
    # 'unsafe-inline' for styles is *kept* as a hedge — Vite production normally extracts
    # all CSS, but bitcoinjs-lib or React error boundaries may inject inline styles.
    # Tighten to 'self' only after staging validation confirms zero inline styles.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'; manifest-src 'self'; upgrade-insecure-requests;" always;

    # Anti-clickjacking — CSP frame-ancestors is primary, this is for legacy browsers
    add_header X-Frame-Options "DENY" always;

    # Block MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Explicitly disable the legacy XSS auditor (CSP is the real defense; XSS auditor has
    # caused security issues itself — modern best practice is to disable it)
    add_header X-XSS-Protection "0" always;

    # Don't leak referrer to anywhere
    add_header Referrer-Policy "no-referrer" always;

    # Deny browser features we don't need
    add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(), camera=(), display-capture=(), document-domain=(), encrypted-media=(), fullscreen=(), gamepad=(), geolocation=(), gyroscope=(), keyboard-map=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), serial=(), speaker-selection=(), sync-xhr=(), usb=(), web-share=(), xr-spatial-tracking=(), interest-cohort=()" always;

    # Cross-origin isolation hardening — defense against window.opener tricks + Spectre
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # ─── Frontend (static files) ─────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── API proxy ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate-limit at edge in addition to the per-IP limit inside Express
        limit_req zone=wallet_api burst=20 nodelay;
    }

    # ─── Block direct access to internal endpoints ──────────────────────
    location = /health {
        deny all;
    }

    # Disable access logs for static assets (reduces disk + leak surface)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|wasm)$ {
        access_log off;
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
    }

    # No directory listings, no version disclosure
    server_tokens off;
}
