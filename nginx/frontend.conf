# Inner-tier nginx running inside the wallet-frontend Docker container.
# Serves the Vite-built static dist/ on port 80 (mapped to 127.0.0.1:3002).
# Outer nginx (on vps1) reverse-proxies HTTPS traffic here; this layer is
# defense-in-depth in case the outer layer is bypassed or removed.

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # ─── Security headers (defense-in-depth; outer nginx sets the canonical set) ───
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (filenames are content-hashed)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|wasm)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # Don't cache index.html (HTML changes when assets change)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
    }
}
